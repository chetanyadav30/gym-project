<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Gym</title>
    <style>
        body{
            color: white;
            margin: 0px;
            padding: 0px;
            background: url('barbell.jpg');
        }
        .left{
            display: inline-block;
            /* border: 2px solid red; */
            position: absolute;
            left: 30px;
            top: 20px;
        }
        .left img{
            width: 180px;
            filter:invert(20%);
            border-radius: 60%;

        }
        .left div{
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            line-height: 19px;
        }
        .mid{
            display: block;
            /* border: 2px solid green; */
            width: 48%;
            margin: 20px auto;
        }
        .navbar{
            display: inline-block;
        }
        
        .navbar li{
            display: inline-block;
            font-size: 20px;
        }
        .navbar li a{
            color: white;
            text-decoration: none;
            padding: 20px 20px;

        }
        .navbar li a:hover,.navbar li a:active{
            color: gray;
            text-decoration: underline;
        }
        .right{
            display: inline-block;
            position: absolute;
            right: 20px;
            top: 20px;
            /* border: 2px solid purple; */
        }
        .btn{
            cursor: pointer;
            margin: 0px 9px;
            background-color: brown;
            color: white;
            padding: 4px 14px;
            border: 2px solid grey;
            border-radius: 10px;
            font-size: 20px;

        }
        .btn:hover{
            background-color: gray;
        }
        .container{
            border: 2px solid ;
            margin: 170px 100px;
            padding: 70px;
            width: 33%;
            border-radius: 20px;
        }
        .form-group input{
            text-align: center;
            border: 2px solid black;
            margin: 11px auto;
            font-size: 20px;
            border-radius: 10px;
            padding: 1px;
            
        }
        .container h1{
            text-align: center;
        }
        .container button{
            display: block;
            width: 40%;
            margin: 20px 10px;
        }
        .container select{
            text-align: center;
border: 2px solid black;
margin: 11px auto;
font-size: 20px;
border-radius: 10px;
padding: 1px;
width: 200px;
        }
    </style>
    
</head>
<body>
    <header class="header">
        <div class="left">
            <img src="dumbbells.jpg" alt="loading">
            <div>TORSO</div>
        </div>
        <div class="mid">
            <ul class="navbar">
                <li><a href="#">HOME</a></li>
                <li><a href="#">ABOUT US</a></li>
                <li><a href="#">Fitness Calculator</a></li>
                <li><a href="#">Contact US</a></li>
            </ul>
        </div>
        <div class="right">
            <button class="btn">Call us now</button>
            <button class="btn">Email id</button>
        </div>
    </header>
    <div class="container">
        <h1>Join the best gym in Delhi</h1>
        <form action="/" method="POST" id="contact" >
            <div class="form-group">
                <label for="name">NAME</label>
                : <input type="text" name="name" id="name" placeholder="enter your name" required>
            </div>
            <div class="form-group">
                <label for="email">EMAIL</label>
                : <input type="text" name="email" id="email" placeholder="enter your email" required>
            </div>
            <div class="form-group">
                <label for="age">AGE</label>
                : <input type="number" name="age" id="age" placeholder="age" required>
            </div>
            <div class="form-group">
                <label for="sex">GENDER</label>
                : male <input type="radio" name="gender" id="sex" required multiple> female <input type="radio" name="gender" id="sex" required multiple> other <input type="radio" name="gender" id="sex" multiple>
            </div>
            <div class="form-group">
                <label for="locality">LOCALITY</label>
                : <input type="text" id="locality" placeholder="enter your phone number"required>
            </div>
            <div class="form-group">
                <label for="data">DATE OF JOINING</label>
                : <input type="date" name="date" id="date">
            </div>
            <div class="form-group">
                <label for="goal">WHAT IS YOUR GOAL?</label>
                : <select name="goal" id="goal"  >
                
                    <option value="muscle gain">muscle gain</option>
                    <option value="weightloss">weightloss</option>
                    <option value="lean muscle">lean muscle</option>
                    <option value="weightlifting">weightlifting</option>
                </select>
            </div>
            <button class="btn">SUBMIT</button>
        </form>
    </div>
</body>
</html>
